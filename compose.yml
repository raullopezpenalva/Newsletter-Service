services:
  postgres:
    image: postgres:15
    container_name: newsletter_postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dev-network
  
  Email-Service:
    image: maildev/maildev
    container_name: email_service
    ports:
      - "1080:1080"  # Web UI
    expose:
      - 1025      # SMTP
    networks:
      - dev-network

  testnewsletter-service:
    build: .
    image: testnewsletter-service:latest
    container_name: testnewsletter_service
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - Email-Service
    networks:
      - dev-network
  
  frontend:
    image: ghcr.io/raullopezpenalva/newsletter-frontend:latest
    container_name: newsletter_frontend
    ports:
      - "80:80"
    networks:
      - dev-network

volumes:
  postgres_data:

networks:
  dev-network:
    external: true